<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" [routerLink]="['/']">Marcador Baloncesto</a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['/']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            Inicio
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['/results']" routerLinkActive="active">
            Resultados
          </a>
        </li>
      </ul>
      
      <ul class="navbar-nav" *ngIf="isAuthenticated">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" 
             data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle me-1"></i>
            {{ username }}
            <span class="badge bg-secondary ms-2" *ngIf="userRole">
              {{ userRole }}
            </span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
            <li><a class="dropdown-item" href="#">Mi perfil</a></li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item text-danger" href="#" (click)="logout(); $event.preventDefault()">
                <i class="bi bi-box-arrow-right me-1"></i> Cerrar sesión
              </a>
            </li>
          </ul>
        </li>
      </ul>
      
      <ul class="navbar-nav" *ngIf="!isAuthenticated">
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['/login']" routerLinkActive="active">
            <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesión
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
