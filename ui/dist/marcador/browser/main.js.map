<div class="card p-3" style="background: rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); height:100%; display:flex; flex-direction:column;">
  <div class="card-header" style="display:block; margin-bottom:.5rem;">
    <div class="card-title">Plantilla {{ side }}</div>
    <div class="card-subtitle">Jugadores activos en el partido</div>
  </div>
  
  <div class="input-group" style="align-items:stretch; width:100%; flex:1 1 auto;">
    <div *ngIf="players.length; else empty" style="width:100%;">
      <div style="max-height: 280px; overflow-y: auto; border-radius: 8px;">
        <ul class="list-clean text-sm" style="margin:0;">
          <li *ngFor="let p of players; let i = index" 
              style="display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-bottom: 1px solid rgba(255,255,255,0.06);"
              [style.border-bottom]="i === players.length - 1 ? 'none' : '1px solid rgba(255,255,255,0.06)'">
            <div style="display:flex; align-items:center; gap:8px;">
              <span class="text-xs" style="opacity:.7; border:1px solid rgba(255,255,255,0.18); padding:2px 6px; border-radius:999px; min-width:28px; text-align:center;">
                #{{ p.number ?? '—' }}
              </span>
              <span class="font-medium">{{ p.name }}</span>
            </div>
            <span class="text-xs muted" *ngIf="p.position" style="opacity:.6;">{{ p.position }}</span>
          </li>
        </ul>
      </div>
    </div>
    
    <ng-template #empty>
      <div class="text-center" style="padding:20px; opacity:.6;">
        <div class="text-sm muted">Sin jugadores asignados</div>
        <div class="text-xs muted" style="margin-top:4px;">Los jugadores aparecerán aquí una vez configurada la plantilla</div>
      </div>
    </ng-template>
  </div>
</div>
